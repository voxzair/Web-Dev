<head>

</head>

<body class="body">

    

    <div class="titleBlock">
        <img src="img.jpg" class="img">
        <h1 class="title"> Список дел </h1>
    </div>
    
    <div class="inputButtonsBlock">
        <div class="inputBlock"> <input class="input" placeholder="Новый элемент списка"> </div>
        <div class="buttonsBlock"> <button class="buttonAdd"> Создать </button> </div>
        <div class="buttonsBlock"> <button class="buttonClear"> Очистить всё </button> </div>
    </div>
        
    <div class="list">
        <ul class="nuList">
            <li>
                <div class="listBlock">
                    <input type="checkbox" class="complete">
                    <div class="centerBlock">
                        <div class="textBlock"> <s> Почесать кошку </s> </div>
                        <div class="dateBlock"> <sup> от 14.08.2023 </sup> </div>
                    </div>
                    <button class="delete"> <b> × </b> </button>
                </div>
            </li>
            
            <li>
                <div class="listBlock1">
                    <input type="checkbox" class="complete1">
                    <div class="centerBlock">
                        <div class="textBlock1"> Полить картошку </div>
                        <div class="dateBlock1"> <sup> от 04.05.2022 </sup> </div>
                    </div>
                    <button class="delete1"> <b> × </b> </button>
                </div>
            </li>

            <li>
                <div class="listBlock2">
                    <input type="checkbox" class="complete2">
                    <div class="centerBlock">
                        <div class="textBlock1"> Сложить в лукошко </div>
                        <div class="dateBlock1"> <sup> от 19.05.2022</sup> </div>
                    </div>
                    <button class="delete2"> <b> × </b> </button>
                </div>
            </li>

            <li>
                <div class="listBlock2">
                    <input type="checkbox" class="complete2">
                    <div class="centerBlock">
                        <div class="textBlock1"> Сложить в лукошкоооооооооооооооооооооооооооооооооооооооо </div>
                        <div class="dateBlock1"> <sup> от 19.05.2022</sup> </div>
                    </div>
                    <button class="delete2"> <b> × </b> </button>
                </div>
            </li>
            
        </ul>
    </div>

</body>
