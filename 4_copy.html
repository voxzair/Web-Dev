<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        
        body {
            font-family: 'Roboto', sans-serif; 
            background-color: #3f5d5e; 
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column; 
            min-height: 100vh; 
        }

        
        .app-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .todo-block {
            width: 100%;
            max-width: 600px; 
        }

        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; 
        }

        .header h1 {
            font-family: 'Caveat', cursive; 
            font-size: 50px;
            margin: 10px 0;
        }

        
        .controls {
            display: flex;
            gap: 10px; 
            margin-bottom: 20px;
        }

        .controls input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-create { background-color: #e0e0e0; }
        .btn-clear { background-color: #a84242; color: white; }

        
        @media (max-width: 500px) {
            .controls {
                flex-direction: column; 
            }
        }

       
        .todo-list {
            list-style: none; 
            padding: 0;
            margin: 0;
            max-height: 250px; 
            overflow-y: auto;  
            background: white;
            color: black;
        }

        
        .empty-message {
            display: none; 
            text-align: center;
            padding: 20px;
        }

        
        .todo-list:empty + .empty-message {
            display: block;
        }

        
        .todo-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ccc; 
            transition: background 0.2s; 

        
        .todo-item:hover {
            background-color: #f0f0f0;
        }

        .task-content {
            flex: 1; 
            min-width: 0; 
            margin: 0 10px;
            display: flex;
            flex-direction: column;
        }

        
        .task-text {
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .task-date {
            font-size: 12px;
            color: gray;
        }

        
        .btn-delete {
            background: none;
            border: none;
            font-size: 18px;
            color: gray;
            cursor: pointer;
        }

        
        .todo-item:hover .btn-delete {
            color: red;
        }

       
        .footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: auto; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="todo-block">
            
            <div class="header">
                <span style="font-size: 40px;"></span>
                <h1>Список дел</h1>
            </div>

            <div class="controls">
                <input type="text" placeholder="Новый элемент списка">
                <button class="btn btn-create">Создать</button>
                <button class="btn btn-clear">Очистить всё</button>
            </div>

            <ul class="todo-list">
                <li class="todo-item">
                    <input type="checkbox">
                    <div class="task-content">
                        <span class="task-text">Почесать кошку</span>
                        <span class="task-date">от 14.08.2023</span>
                    </div>
                    <button class="btn-delete">✖</button>
                </li>
                
                <li class="todo-item">
                    <input type="checkbox">
                    <div class="task-content">
                        <span class="task-text">Полить картошку</span>
                        <span class="task-date">от 04.05.2022</span>
                    </div>
                    <button class="btn-delete">✖</button>
                </li>

                <li class="todo-item">
                    <input type="checkbox">
                    <div class="task-content">
                        <span class="task-text">Сложить в лукошко </span>
                        <span class="task-date">от 19.05.2022</span>
                    </div>
                    <button class="btn-delete">✖</button>
                </li>
            </ul>
            
            <div class="empty-message">Не найдено ни одного дела</div>

        </div>
    </div>

    <footer class="footer">
        Copyright © 2026
    </footer>

</body>
